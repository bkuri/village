name: Bump Label Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main

permissions:
  pull-requests: read

jobs:
  check-bump-label:
    runs-on: ubuntu-latest
    steps:
      - name: Check bump label
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # For push-to-main events the label gate does not apply — just pass.
          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "Push to main detected — bump label check skipped."
            exit 0
          fi

          # Fetch current labels from the GitHub API instead of relying on
          # the event payload, which can be stale for synchronize/reopened
          # events or missing labels added after the PR was opened.
          LABELS_JSON=$(gh api \
            "repos/$REPO/pulls/$PR_NUMBER" \
            --jq '.labels[].name')

          BUMP_LABEL=$(echo "$LABELS_JSON" | grep '^bump:' | head -n1)

          if [[ -z "$BUMP_LABEL" ]]; then
            echo ""
            echo "Error: This PR requires a bump label."
            echo "Add one of: bump:major, bump:minor, bump:patch, bump:none"
            echo ""
            echo "bump:major  - Breaking changes, API removal"
            echo "bump:minor  - New features, backwards-compatible"
            echo "bump:patch  - Bug fixes, small improvements"
            echo "bump:none   - Docs, tests, internal refactors"
            exit 1
          fi

          echo "Bump label found: $BUMP_LABEL"
